<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Quản Lý Thực Đơn Full</title>
    <style>
        body { font-family: sans-serif; background: #f4f4f9; padding: 20px; }
        .container { max-width: 800px; margin: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        h2 { border-bottom: 2px solid #eee; padding-bottom: 10px; color: #2c3e50; }
        .menu-item { display: flex; align-items: center; justify-content: space-between; padding: 10px; border-bottom: 1px solid #eee; }
        .item-img { width: 50px; height: 50px; object-fit: cover; border-radius: 5px; margin-right: 15px; border: 1px solid #ccc; }
        .btn-group { display: flex; gap: 5px; }
        button { cursor: pointer; padding: 8px 15px; border-radius: 5px; border: none; font-weight: bold; transition: 0.2s; }
        button:hover { opacity: 0.8; }
        .add-form { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; background: #e8f6f3; padding: 15px; border-radius: 8px; margin-bottom: 20px; }
        .add-form input[type="text"], .add-form input[type="number"] { padding: 8px; border: 1px solid #ccc; border-radius: 4px; flex: 1; min-width: 150px; }
    </style>
</head>
<body>
    <div id="login-overlay" style="position: fixed; top:0; left:0; width:100%; height:100%; background:white; z-index:9999; display:flex; flex-direction:column; justify-content:center; align-items:center;">
        <h2>🔒 Khu Vực Quản Trị</h2>
        <input type="password" id="admin-pass" placeholder="Nhập mật khẩu..." style="padding: 10px; width: 200px; margin-bottom: 10px; text-align: center; border: 1px solid #ccc; border-radius: 5px;">
        <button onclick="checkPass()" style="background: #3498db; color: white;">Đăng nhập</button>
    </div>

    <div class="container">
        <h2>🔔 Đơn Hàng Mới</h2>
        <div id="order-list"></div>

        <h2>➕ Thêm Món Mới</h2>
        <div class="add-form">
            <input type="text" id="newName" placeholder="Tên món (VD: Bún Bò)">
            <input type="number" id="newPrice" placeholder="Giá (VD: 35000)">
            
            <div style="display: flex; align-items: center; gap: 5px;">
                <input type="file" id="newImageFile" accept="image/*" style="display: none;" onchange="updateFileName(this)">
                <button onclick="document.getElementById('newImageFile').click()" style="background: #3498db; color: white;">📸 Chọn Ảnh</button>
                <small id="fileName" style="color: #666; max-width: 120px; overflow: hidden; white-space: nowrap; text-overflow: ellipsis;">Chưa chọn...</small>
            </div>

            <button onclick="addNewItem()" style="background: #27ae60; color: white; margin-left: auto;">+ Lưu Món</button>
        </div>

        <h2>⚙️ Quản lý Bàn & QR</h2>
        <div style="background: #f9f9f9; padding: 15px; border-radius: 8px; border: 1px solid #ddd; display: flex; align-items: center; gap: 10px; flex-wrap: wrap;">
            <input type="text" id="tableNumberInput" placeholder="Nhập số bàn (VD: 01)" style="padding: 8px; border: 1px solid #ccc; border-radius: 4px;">
            <button onclick="generateQR()" style="background: #8e44ad; color: white;">Tạo Mã QR</button>
            <div id="qr-result" style="display:none; width: 100%; text-align:center; margin-top:15px;">
                <img id="qr-image" style="max-width:200px; border: 4px solid #fff; box-shadow: 0 0 10px rgba(0,0,0,0.1);">
            </div>
        </div>

        <h2>📋 Danh sách thực đơn</h2>
        <ul id="admin-menu-list" style="list-style: none; padding: 0;"></ul>
    </div>

    <script>
    const restaurantId = '6a2832bc08e5471d0399ab98';
    const apiUrl = 'https://qr-order-backend-1.onrender.com/api/menu';

    function checkPass() { 
        if(document.getElementById('admin-pass').value === "123456") 
            document.getElementById('login-overlay').style.display = 'none'; 
        else alert("Sai mật khẩu!");
    }

    function updateFileName(input) {
        const fileNameDisplay = document.getElementById('fileName');
        if (input.files && input.files.length > 0) {
            fileNameDisplay.innerText = input.files[0].name;
            fileNameDisplay.style.color = '#27ae60';
        } else {
            fileNameDisplay.innerText = 'Chưa chọn...';
            fileNameDisplay.style.color = '#666';
        }
    }

    function generateQR() {
        const table = document.getElementById('tableNumberInput').value;
        if (!table) return alert("Vui lòng nhập số bàn!");
        const domain = window.location.origin;
        const qrUrl = `${domain}/index.html?shop=${restaurantId}&table=${table}`;
        document.getElementById('qr-image').src = `https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=${encodeURIComponent(qrUrl)}`;
        document.getElementById('qr-result').style.display = 'block';
    }

    async function loadAdminMenu() {
        try {
            const res = await fetch(`${apiUrl}/${restaurantId}`);
            const result = await res.json();
            const list = document.getElementById('admin-menu-list');
            list.innerHTML = '';
            
            const menuItems = result.data || result; 
            if (Array.isArray(menuItems)) {
                menuItems.forEach(item => {
                    const li = document.createElement('li');
                    li.className = 'menu-item';
                    const imgSrc = item.imageUrl || 'https://via.placeholder.com/50?text=No+Img';
                    const isAvailable = item.isAvailable !== false; 
                    
                    li.innerHTML = `
                        <div style="display:flex; align-items:center; opacity: ${isAvailable ? '1' : '0.5'};">
                            <img src="${imgSrc}" class="item-img">
                            <span style="font-size: 16px; font-weight: bold; ${isAvailable ? '' : 'text-decoration: line-through;'}">
                                ${item.itemName} - <span style="color: #e74c3c;">${item.price}đ</span>
                                ${isAvailable ? '' : '<span style="color:red; font-size:12px; margin-left:5px;">(Hết)</span>'}
                            </span>
                        </div>
                        <div class="btn-group">
                            <button onclick="editPrice('${item._id}', ${item.price})" style="background:#f39c12; color:white;">Sửa Giá</button>
                            <button onclick="toggleStatus('${item._id}', ${isAvailable})" style="background:#34495e; color:white;">${isAvailable ? 'Báo Hết' : 'Mở Bán'}</button>
                            <button onclick="deleteItem('${item._id}')" style="background:#c0392b; color:white;">Xóa</button>
                        </div>
                    `;
                    list.appendChild(li);
                });
            }
        } catch (error) { console.error("Lỗi tải menu:", error); }
    }

    async function addNewItem() {
        const name = document.getElementById('newName').value;
        const price = document.getElementById('newPrice').value;
        const fileInput = document.getElementById('newImageFile');

        if (!name || !price) return alert("Vui lòng nhập đủ tên và giá tiền!");
        let imageUrl = '';

        if (fileInput.files.length > 0) {
            const file = fileInput.files[0];
            if (file.size > 2 * 1024 * 1024) return alert("File ảnh quá nặng! Vui lòng chọn ảnh dưới 2MB.");
            imageUrl = await new Promise((resolve) => {
                const reader = new FileReader();
                reader.onloadend = () => resolve(reader.result);
                reader.readAsDataURL(file);
            });
        }

        try {
            await fetch(apiUrl, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ restaurantId, itemName: name, price: Number(price), imageUrl: imageUrl, isAvailable: true })
            });
            
            document.getElementById('newName').value = '';
            document.getElementById('newPrice').value = '';
            document.getElementById('newImageFile').value = '';
            document.getElementById('fileName').innerText = 'Chưa chọn...';
            document.getElementById('fileName').style.color = '#666';
            loadAdminMenu();
        } catch (error) { alert("Lỗi khi thêm món!"); }
    }

    async function editPrice(id, currentPrice) {
        const newPrice = prompt("Nhập giá mới cho món này:", currentPrice);
        if (newPrice && !isNaN(newPrice)) {
            await fetch(`${apiUrl}/${id}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ price: Number(newPrice) })
            });
            loadAdminMenu();
        }
    }

    async function toggleStatus(id, currentStatus) {
        await fetch(`${apiUrl}/${id}`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ isAvailable: !currentStatus })
        });
        loadAdminMenu();
    }

    async function deleteItem(id) { 
        if(confirm("Bạn có chắc muốn xóa món này?")) {
            await fetch(`${apiUrl}/${id}`, { method: 'DELETE' }); 
            loadAdminMenu(); 
        }
    }

    async function checkNewOrders() {
        try {
            const res = await fetch(`https://qr-order-backend-1.onrender.com/api/orders/${restaurantId}`);
            const orders = await res.json();
            
            if (Array.isArray(orders)) {
                const now = new Date(); 
                const ordersHTML = orders.map(o => {
                    const orderTime = o.createdAt 
                        ? new Date(o.createdAt).toLocaleTimeString('vi-VN', { hour: '2-digit', minute: '2-digit' }) 
                        : '--:--';

                    const timeMark = new Date(o.updatedAt || o.createdAt);
                    const diffInMinutes = (now - timeMark) / (1000 * 60); 

                    if (o.status === 'completed' && diffInMinutes > 1) {
                        return ''; 
                    }

                    return `
                        <div style="background: #fff3cd; border-left: 4px solid #f39c12; padding:15px; margin-bottom:10px; border-radius: 4px; ${o.status === 'completed' ? 'opacity: 0.6;' : ''}">
                            <div style="margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center;">
                                <div>
                                    <strong style="font-size: 16px;">Bàn ${o.tableNumber}</strong> | 
                                    <span style="color: ${o.status === 'pending' ? 'red' : 'green'}; font-weight: bold;">
                                        ${o.status === 'pending' ? '⏳ Đang làm' : '✅ Đã xong'}
                                    </span>
                                </div>
                                <span style="font-size: 13px; color: #555; background: #ffe69c; padding: 3px 8px; border-radius: 10px; font-weight: bold;">
                                    🕒 ${orderTime}
                                </span>
                            </div>
                            <div style="font-size: 15px; margin-bottom: 8px;">
                                <strong>Món:</strong> 
                                ${o.items && Array.isArray(o.items) ? o.items.map(i => `
                                    <span style="display: inline-block; background: #fdfae9; padding: 2px 5px; border: 1px solid #f39c12; border-radius: 4px; margin: 2px;">
                                        ${i.itemName} <strong>x${i.quantity || 1}</strong>
                                    </span>
                                `).join(' ') : 'Trống'}
                            </div>
                            ${o.status === 'pending' ? `<button onclick="completeOrder('${o._id}')" style="background: #27ae60; color: white; padding: 6px 12px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold;">Hoàn thành đơn</button>` : ''}
                        </div>
                    `;
                }).join(''); 
                document.getElementById('order-list').innerHTML = ordersHTML || '<p style="color: #666; font-style: italic; text-align: center;">Chưa có đơn hàng mới nào hoặc đơn đã hoàn thành...</p>';
            }
        } catch (error) { console.error("Lỗi tải đơn hàng:", error); }
    }

    async function completeOrder(id) { 
        if(confirm("Xác nhận đã làm xong đơn này?")) {
            try {
                const response = await fetch(`https://qr-order-backend-1.onrender.com/api/orders/${id}`, { 
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' }
                }); 
                
                if(response.ok) {
                    checkNewOrders(); 
                } else {
                    alert("Backend báo lỗi không cập nhật được!");
                }
            } catch(err) {
                alert("Lỗi kết nối mạng khi hoàn thành đơn!");
                console.error(err);
            }
        }
    }

    loadAdminMenu(); 
    checkNewOrders(); 
    setInterval(checkNewOrders, 5000);
    </script>
</body>
</html>

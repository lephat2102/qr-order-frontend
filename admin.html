<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Quản Lý Thực Đơn Full</title>
    <style>
        body { font-family: sans-serif; background: #f4f4f9; padding: 20px; }
        .container { max-width: 800px; margin: auto; background: white; padding: 20px; border-radius: 10px; }
        .menu-item { display: flex; align-items: center; justify-content: space-between; padding: 10px; border-bottom: 1px solid #eee; }
        .item-img { width: 50px; height: 50px; object-fit: cover; border-radius: 5px; margin-right: 10px; }
        .btn-group { display: flex; gap: 5px; }
        button { cursor: pointer; padding: 5px 10px; }
    </style>
</head>
<body>
    <div id="login-overlay" style="position: fixed; top:0; left:0; width:100%; height:100%; background:white; z-index:9999; display:flex; flex-direction:column; justify-content:center; align-items:center;">
        <h2>🔒 Quản trị</h2>
        <input type="password" id="admin-pass" placeholder="Mật khẩu...">
        <button onclick="checkPass()">Đăng nhập</button>
    </div>

    <div class="container">
        <h2>🔔 Đơn Hàng Mới</h2>
        <div id="order-list"></div>

        <hr>
        <h2>➕ Thêm Món Mới</h2>
        <input type="text" id="newName" placeholder="Tên món">
        <input type="number" id="newPrice" placeholder="Giá">
        <input type="text" id="newImage" placeholder="Link ảnh">
        <button onclick="addNewItem()">Thêm</button>

        <h2>⚙️ Quản lý QR</h2>
        <input type="text" id="tableNumberInput" placeholder="Số bàn">
        <button onclick="generateQR()">Tạo Mã QR</button>
        <div id="qr-result" style="display:none; text-align:center; margin-top:10px;">
            <img id="qr-image" style="max-width:200px;">
        </div>

        <h2>📋 Menu hiện tại</h2>
        <ul id="admin-menu-list"></ul>
    </div>

   <script>
    const restaurantId = '6a2832bc08e5471d0399ab98';
    const apiUrl = 'https://qr-order-backend-1.onrender.com/api/menu';

    function checkPass() { 
        if(document.getElementById('admin-pass').value === "123456") 
            document.getElementById('login-overlay').style.display = 'none'; 
    }

    // Tải menu và hiển thị nút Xóa/Bật-Tắt
    async function loadAdminMenu() {
        const res = await fetch(`${apiUrl}/${restaurantId}`);
        const result = await res.json();
        const list = document.getElementById('admin-menu-list');
        list.innerHTML = '';
        if(result.success) {
            result.data.forEach(item => {
                const li = document.createElement('li');
                li.className = 'menu-item';
                li.innerHTML = `
                    <div style="display:flex; align-items:center;">
                        <img src="${item.imageUrl || 'https://via.placeholder.com/50'}" class="item-img">
                        <span>${item.itemName} - ${item.price}đ</span>
                    </div>
                    <div class="btn-group">
                        <button onclick="deleteItem('${item._id}')" style="background:#e74c3c; color:white;">Xóa</button>
                    </div>
                `;
                list.appendChild(li);
            });
        }
    }

    async function addNewItem() {
        await fetch(apiUrl, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ 
                restaurantId, 
                itemName: document.getElementById('newName').value, 
                price: document.getElementById('newPrice').value,
                imageUrl: document.getElementById('newImage').value
            })
        });
        loadAdminMenu();
    }

    async function deleteItem(id) { 
        await fetch(`${apiUrl}/${id}`, { method: 'DELETE' }); 
        loadAdminMenu(); 
    }

    async function checkNewOrders() {
        const res = await fetch(`https://qr-order-backend-1.onrender.com/api/orders/${restaurantId}`);
        const orders = await res.json();
        document.getElementById('order-list').innerHTML = orders.map(o => `
            <div style="border:1px solid #ccc; padding:10px; margin-bottom:5px;">
                <strong>Bàn ${o.tableNumber}</strong> - ${o.status === 'pending' ? '⏳ Đang làm' : '✅ Xong'} 
                <div>${o.items.map(i => i.itemName).join(', ')}</div>
                ${o.status === 'pending' ? `<button onclick="completeOrder('${o._id}')">Hoàn thành</button>` : ''}
            </div>
        `).join('');
    }

    async function completeOrder(id) { 
        await fetch(`https://qr-order-backend-1.onrender.com/api/orders/${id}`, { method: 'PUT' }); 
        checkNewOrders(); 
    }

    // Chạy khởi tạo
    loadAdminMenu(); 
    checkNewOrders(); 
    setInterval(checkNewOrders, 5000);
</script>
</body>
</html>

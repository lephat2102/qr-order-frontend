<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Quản Lý Nhà Hàng</title>
    <style>
        body { font-family: sans-serif; background: #f4f4f9; padding: 20px; }
        .container { max-width: 800px; margin: auto; background: white; padding: 20px; border-radius: 10px; }
        .item-row { display: flex; align-items: center; justify-content: space-between; padding: 10px; border-bottom: 1px solid #ddd; }
        .item-img { width: 50px; height: 50px; object-fit: cover; border-radius: 5px; }
    </style>
</head>
<body>
    <div id="login-overlay" style="position: fixed; top:0; left:0; width:100%; height:100%; background:white; z-index:9999; display:flex; flex-direction:column; justify-content:center; align-items:center;">
        <h2>🔒 Quản trị</h2>
        <input type="password" id="admin-pass" placeholder="Mật khẩu...">
        <button onclick="checkPass()">Đăng nhập</button>
    </div>

    <div class="container">
        <h2>🔔 Đơn Hàng Mới</h2>
        <div id="order-list"></div>

        <h2>➕ Thêm Món Mới</h2>
        <input type="text" id="newName" placeholder="Tên món">
        <input type="number" id="newPrice" placeholder="Giá">
        <input type="text" id="newImage" placeholder="Link ảnh món ăn">
        <button onclick="addNewItem()">Thêm món</button>

        <h2>📋 Menu hiện tại</h2>
        <ul id="admin-menu-list"></ul>
    </div>

    <script>
        const restaurantId = '6a2832bc08e5471d0399ab98';
        const apiUrl = 'https://qr-order-backend-1.onrender.com/api/menu';

        function checkPass() {
            if (document.getElementById('admin-pass').value === "123456") 
                document.getElementById('login-overlay').style.display = 'none';
        }

        // Tải Menu kèm ảnh
        async function loadAdminMenu() {
            const res = await fetch(`${apiUrl}/${restaurantId}`);
            const result = await res.json();
            const list = document.getElementById('admin-menu-list');
            list.innerHTML = '';
            result.data.forEach(item => {
                const li = document.createElement('li');
                li.className = 'item-row';
                li.innerHTML = `
                    <img src="${item.imageUrl || 'https://via.placeholder.com/50'}" class="item-img">
                    <div>${item.itemName} - ${item.price}đ</div>
                    <button onclick="deleteItem('${item._id}')">Xóa</button>
                `;
                list.appendChild(li);
            });
        }

        // Thêm món với ảnh
        async function addNewItem() {
            const name = document.getElementById('newName').value;
            const price = document.getElementById('newPrice').value;
            const img = document.getElementById('newImage').value;
            await fetch(apiUrl, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ restaurantId, itemName: name, price, imageUrl: img })
            });
            loadAdminMenu();
        }

        async function deleteItem(id) {
            await fetch(`${apiUrl}/${id}`, { method: 'DELETE' });
            loadAdminMenu();
        }

        async function checkNewOrders() {
            const res = await fetch(`https://qr-order-backend-1.onrender.com/api/orders/${restaurantId}`);
            const orders = await res.json();
            const list = document.getElementById('order-list');
            list.innerHTML = orders.map(order => `
                <div style="border: 1px solid #ccc; padding:10px; margin-bottom:10px;">
                    <strong>Bàn: ${order.tableNumber}</strong> - ${order.status === 'pending' ? '⏳' : '✅'}
                    <div>Món: ${order.items.map(i => i.itemName).join(', ')}</div>
                    ${order.status === 'pending' ? `<button onclick="completeOrder('${order._id}')">Hoàn thành</button>` : ''}
                </div>
            `).join('');
        }

        async function completeOrder(id) {
            await fetch(`https://qr-order-backend-1.onrender.com/api/orders/${id}`, { method: 'PUT' });
            checkNewOrders();
        }

        loadAdminMenu();
        checkNewOrders();
        setInterval(checkNewOrders, 5000);
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thực Đơn Gọi Món</title>
    <style>
        body { 
            font-family: Arial, sans-serif; 
            background-color: #f4f4f9; 
            margin: 0; 
            padding: 20px;
            padding-bottom: 100px; /* Chừa khoảng trống ở dưới cho thanh giỏ hàng cố định */
        }
        .header {
            text-align: center;
            padding-bottom: 15px;
            border-bottom: 2px solid #ddd;
            margin-bottom: 20px;
        }
        .menu-item { 
            background: white; 
            padding: 15px; 
            border-radius: 8px; 
            margin-bottom: 15px; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.1); 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
        }
        .item-name { 
            font-size: 18px; 
            font-weight: bold; 
            color: #333; 
        }
        .item-price { 
            color: #e74c3c; 
            font-weight: bold; 
            margin-top: 5px;
        }
        .btn-add { 
            background: #27ae60; 
            color: white; 
            border: none; 
            padding: 8px 15px; 
            border-radius: 5px; 
            font-weight: bold;
            cursor: pointer; 
        }
        .btn-add:active { background: #219653; }

        /* Giao diện thanh Giỏ hàng cố định ở dưới cùng màn hình di động */
        .cart-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #2c3e50;
            color: white;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 -3px 10px rgba(0,0,0,0.2);
            border-top-left-radius: 15px;
            border-top-right-radius: 15px;
        }
        .cart-info {
            font-size: 16px;
        }
        .btn-checkout {
            background: #e67e22;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }
        .btn-checkout:active { background: #d35400; }
    </style>
</head>
<body>

    <div class="header">
        <h2>🍽️ Thực Đơn Gọi Món</h2>
        <p style="color: #666; margin-top: -10px;">Bàn số: <strong id="table-display">05</strong></p>
    </div>
    
    <div id="menu-container">
        <p style="text-align: center; color: #888;">Đang tải thực đơn từ máy chủ...</p>
    </div>

    <div class="cart-bar">
        <div class="cart-info">
            <div>Giỏ hàng: <strong id="cart-count">0</strong> món</div>
            <div style="color: #f1c40f; font-weight: bold; margin-top: 3px;">Tổng: <span id="cart-total">0</span> VNĐ</div>
        </div>
        <button class="btn-checkout" onclick="sendOrder()">Đặt Món Ngay 🚀</button>
    </div>

    <script>
        // 🔴 Đọc thông tin từ đường link (URL) khi khách quét mã QR
        const urlParams = new URLSearchParams(window.location.search);
        const restaurantId = urlParams.get('shop') || '6a2832bc08e5471d0399ab98'; 
        const tableNumber = urlParams.get('table');

        if (tableNumber) {
            document.getElementById('table-display').innerText = tableNumber;
        } else {
            document.getElementById('table-display').innerText = "Chưa xác định";
            alert("⚠️ Vui lòng quét mã QR tại bàn để hệ thống biết bạn đang ngồi bàn nào nhé!");
        }

        let cart = []; 
        let rawMenuItems = []; 

        async function loadMenu() {
            try {
                const response = await fetch(`https://qr-order-backend-1.onrender.com/api/menu/${restaurantId}`);
                const result = await response.json();
                
                const container = document.getElementById('menu-container');
                container.innerHTML = '';

                if (result.success && result.data.length > 0) {
                    rawMenuItems = result.data;

                    result.data.forEach(item => {
                        // Nếu món ăn bị đánh dấu là "Hết" (isAvailable = false) thì bỏ qua, không in ra menu của khách
                        if(!item.isAvailable) return;

                        const div = document.createElement('div');
                        div.className = 'menu-item';
                        
                        // Đã chèn thêm thẻ <img> và sửa lại cấu trúc thẻ <div> cho chuẩn xác
                        div.innerHTML = `
                            <div style="display: flex; align-items: center;">
                                <img src="${item.imageUrl || 'https://via.placeholder.com/70?text=Chưa+có+ảnh'}" style="width: 70px; height: 70px; border-radius: 8px; object-fit: cover; margin-right: 15px; border: 1px solid #eee;">
                                <div>
                                    <div class="item-name">${item.itemName}</div>
                                    <div class="item-price">${(item.price || 0).toLocaleString('vi-VN')} VNĐ</div>
                                </div>
                            </div>
                            <button class="btn-add" onclick="addToCart('${item._id}')">Chọn</button>
                        `;
                        container.appendChild(div);
                    });
                } else {
                    container.innerHTML = '<p style="text-align: center;">Quán hiện tại chưa có món ăn nào.</p>';
                }
            } catch (error) {
                console.error('Lỗi:', error);
                document.getElementById('menu-container').innerHTML = '<p style="text-align: center; color: red;">Lỗi kết nối Backend!</p>';
            }
        }

        function addToCart(itemId) {
            const menuConvert = rawMenuItems.find(m => m._id === itemId);
            if (!menuConvert) return;

            const existingItem = cart.find(c => c.menuItemId === itemId);

            if (existingItem) {
                existingItem.quantity += 1;
            } else {
                cart.push({
                    menuItemId: itemId,
                    itemName: menuConvert.itemName,
                    price: menuConvert.price,
                    quantity: 1,
                    note: "" 
                });
            }
            updateCartUI();
        }

        function updateCartUI() {
            let totalCount = 0;
            let totalPrice = 0;

            cart.forEach(item => {
                totalCount += item.quantity;
                totalPrice += (item.price * item.quantity);
            });

            document.getElementById('cart-count').innerText = totalCount;
            document.getElementById('cart-total').innerText = totalPrice.toLocaleString('vi-VN');
        }

        async function sendOrder() {
            if (cart.length === 0) {
                alert('Giỏ hàng của bạn đang trống! Vui lòng chọn món trước.');
                return;
            }

            const totalPrice = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);

            const orderData = {
                restaurantId: restaurantId,
                tableNumber: tableNumber,
                items: cart,
                totalPrice: totalPrice
            };

            try {
                const response = await fetch('https://qr-order-backend-1.onrender.com/api/order', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(orderData)
                });

                const result = await response.json();

                if (result.success) {
                    alert('🎉 Đặt món thành công! Nhà bếp đang chuẩn bị món ăn cho bạn.');
                    cart = [];
                    updateCartUI();
                } else {
                    alert('❌ Đặt món thất bại: ' + result.error);
                }
            } catch (error) {
                console.error('Lỗi khi gửi đơn hàng:', error);
                alert('❌ Không thể kết nối với máy chủ để đặt món!');
            }
        }

        loadMenu();
    </script>
</body>
</html>

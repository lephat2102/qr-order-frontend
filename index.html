<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thực Đơn Gọi Món</title>
    <style>
        body { 
            font-family: Arial, sans-serif; 
            background-color: #f4f4f9; 
            margin: 0; 
            padding: 20px;
            padding-bottom: 100px; /* Chừa khoảng trống ở dưới cho thanh giỏ hàng cố định */
        }
        .header {
            text-align: center;
            padding-bottom: 15px;
            border-bottom: 2px solid #ddd;
            margin-bottom: 20px;
        }
        .menu-item { 
            background: white; 
            padding: 15px; 
            border-radius: 8px; 
            margin-bottom: 15px; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.1); 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
        }
        .item-name { 
            font-size: 18px; 
            font-weight: bold; 
            color: #333; 
        }
        .item-price { 
            color: #e74c3c; 
            font-weight: bold; 
            margin-top: 5px;
        }
        .btn-add { 
            background: #27ae60; 
            color: white; 
            border: none; 
            padding: 8px 15px; 
            border-radius: 5px; 
            font-weight: bold;
            cursor: pointer; 
        }
        .btn-add:active { background: #219653; }

        /* Giao diện thanh Giỏ hàng cố định ở dưới cùng màn hình di động */
        .cart-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #2c3e50;
            color: white;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 -3px 10px rgba(0,0,0,0.2);
            border-top-left-radius: 15px;
            border-top-right-radius: 15px;
        }
        .cart-info {
            font-size: 16px;
        }
        .btn-checkout {
            background: #e67e22;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }
        .btn-checkout:active { background: #d35400; }
    </style>
</head>
<body>

    <div class="header">
        <h2>🍽️ Thực Đơn Gọi Món</h2>
        <p style="color: #666; margin-top: -10px;">Bàn số: <strong id="table-display">05</strong></p>
    </div>
    
    <div id="menu-container">
        <p style="text-align: center; color: #888;">Đang tải thực đơn từ máy chủ...</p>
    </div>

    <div class="cart-bar">
        <div class="cart-info">
            <div>Giỏ hàng: <strong id="cart-count">0</strong> món</div>
            <div style="color: #f1c40f; font-weight: bold; margin-top: 3px;">Tổng: <span id="cart-total">0</span> VNĐ</div>
        </div>
        <button class="btn-checkout" onclick="sendOrder()">Đặt Món Ngay 🚀</button>
    </div>

    <script>
        // 🔴 Đọc thông tin từ đường link (URL) khi khách quét mã QR
        const urlParams = new URLSearchParams(window.location.search);
        
        // Ưu tiên lấy ID quán từ link QR, nếu không có thì dùng ID gốc để bạn dễ test trên máy tính
        const restaurantId = urlParams.get('shop') || '6a2832bc08e5471d0399ab98'; 
        
        // Lấy số bàn từ link QR
        const tableNumber = urlParams.get('table');

        // Hiển thị số bàn lên màn hình
        if (tableNumber) {
            document.getElementById('table-display').innerText = tableNumber;
        } else {
            document.getElementById('table-display').innerText = "Chưa xác định";
            // Nếu khách mở web mà không quét mã, cảnh báo ngay
            alert("⚠️ Vui lòng quét mã QR tại bàn để hệ thống biết bạn đang ngồi bàn nào nhé!");
        }

        // Mảng bộ nhớ đệm để lưu các món khách đã chọn
        let cart = []; 
        let rawMenuItems = []; // Lưu danh sách gốc để đối chiếu giá tiền

        // Hàm lấy thực đơn từ server
        async function loadMenu() {
            try {
                const response = await fetch(`https://qr-order-backend-1.onrender.com/api/menu/${restaurantId}`);
                const result = await response.json();
                
                const container = document.getElementById('menu-container');
                container.innerHTML = '';

                if (result.success && result.data.length > 0) {
                    rawMenuItems = result.data; // Lưu lại dữ liệu món ăn gốc

                    result.data.forEach(item => {
                        if(!item.isAvailable) return;

                        const div = document.createElement('div');
                        div.className = 'menu-item';
                        div.innerHTML = `
                            <div>
                                <div class="item-name">${item.itemName}</div>
                               <div class="item-price">${(item.price || 0).toLocaleString('vi-VN')} VNĐ</div>
                            <button class="btn-add" onclick="addToCart('${item._id}')">Chọn</button>
                        `;
                        container.appendChild(div);
                    });
                } else {
                    container.innerHTML = '<p style="text-align: center;">Quán hiện tại chưa có món ăn nào.</p>';
                }
            } catch (error) {
                console.error('Lỗi:', error);
                document.getElementById('menu-container').innerHTML = '<p style="text-align: center; color: red;">Lỗi kết nối Backend!</p>';
            }
        }

        // Hàm thêm món ăn vào giỏ hàng
        function addToCart(itemId) {
            // Tìm xem món ăn này có tồn tại trong danh sách gốc của quán không
            const menuConvert = rawMenuItems.find(m => m._id === itemId);
            if (!menuConvert) return;

            // Kiểm tra xem món này đã nằm trong giỏ hàng trước đó chưa
            const existingItem = cart.find(c => c.menuItemId === itemId);

            if (existingItem) {
                // Nếu đã có rồi, tăng số lượng lên 1
                existingItem.quantity += 1;
            } else {
                // Nếu chưa có, đẩy một cấu trúc đối tượng mới vào mảng
                cart.push({
                    menuItemId: itemId,
                    itemName: menuConvert.itemName,
                    price: menuConvert.price,
                    quantity: 1,
                    note: "" // Hiện tại để trống, có thể nâng cấp thêm ô ghi chú sau
                });
            }

            // Cập nhật lại giao diện con số hiển thị giỏ hàng ngoài màn hình
            updateCartUI();
        }

        // Hàm tính toán tổng tiền và số lượng để cập nhật giao diện thanh dưới cùng
        function updateCartUI() {
            let totalCount = 0;
            let totalPrice = 0;

            cart.forEach(item => {
                totalCount += item.quantity;
                totalPrice += (item.price * item.quantity);
            });

            document.getElementById('cart-count').innerText = totalCount;
            document.getElementById('cart-total').innerText = totalPrice.toLocaleString('vi-VN');
        }

        // Hàm gửi dữ liệu đơn hàng về Backend lưu vào MongoDB
        async function sendOrder() {
            if (cart.length === 0) {
                alert('Giỏ hàng của bạn đang trống! Vui lòng chọn món trước.');
                return;
            }

            // Tính toán lại tổng tiền hóa đơn trước khi đóng gói gửi đi
            const totalPrice = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);

            // Đóng gói cấu trúc dữ liệu JSON đúng hệt như bảng Schema chúng ta viết ở Backend
            const orderData = {
                restaurantId: restaurantId,
                tableNumber: tableNumber,
                items: cart,
                totalPrice: totalPrice
            };

            try {
                // Sử dụng Fetch API với phương thức POST để bắn khối dữ liệu lên máy chủ
                const response = await fetch('https://qr-order-backend-1.onrender.com/api/order', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(orderData) // Chuyển đổi mảng đối tượng JavaScript thành chuỗi dữ liệu JSON
                });

                const result = await response.json();

                if (result.success) {
                    alert('🎉 Đặt món thành công! Nhà bếp đang chuẩn bị món ăn cho bạn.');
                    // Đặt đơn xong thì xóa sạch giỏ hàng hiện tại để khách có thể gọi tiếp đợt sau nếu muốn
                    cart = [];
                    updateCartUI();
                } else {
                    alert('❌ Đặt món thất bại: ' + result.error);
                }
            } catch (error) {
                console.error('Lỗi khi gửi đơn hàng:', error);
                alert('❌ Không thể kết nối với máy chủ để đặt món!');
            }
        }

        // Chạy hàm tải thực đơn ngay khi trang web vừa nạp xong
        loadMenu();
    </script>
</body>
</html>
